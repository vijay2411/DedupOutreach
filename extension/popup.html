<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{--accent:#2f54ff;--line:#e6e8ec;--muted:#6b7280;--ink:#16181d}
  *{box-sizing:border-box}
  body{width:320px;margin:0;padding:16px;font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
    color:var(--ink);font-size:13px;background:#fff}
  .top{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .logo{width:26px;height:26px;border-radius:8px;background:var(--accent);color:#fff;
    display:grid;place-items:center;font-weight:800}
  h1{font-size:15px;margin:0;font-weight:800}
  .sync{font-size:11px;color:var(--muted)}
  label{display:block;font-weight:700;font-size:11px;color:var(--muted);margin:12px 0 4px}
  input,select{width:100%;font-family:inherit;font-size:13px;padding:9px 10px;
    border:1px solid var(--line);border-radius:9px;outline:none;background:#fff;color:var(--ink)}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px #eef1ff}
  .btn{width:100%;margin-top:12px;border:0;border-radius:9px;padding:10px;font-family:inherit;
    font-weight:700;font-size:13px;cursor:pointer;background:var(--accent);color:#fff}
  .btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);margin-top:8px}
  .toggle{display:flex;align-items:center;justify-content:space-between;
    margin-top:14px;padding:10px 12px;background:#f6f7f9;border-radius:10px}
  .toggle b{font-size:13px}.toggle .d{font-size:11px;color:var(--muted)}
  .switch{position:relative;width:42px;height:24px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:#cdd2da;border-radius:20px;transition:.15s;cursor:pointer}
  .slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked+.slider{background:var(--accent)}
  .switch input:checked+.slider:before{transform:translateX(18px)}
  details{margin-top:12px}summary{font-size:12px;color:var(--muted);cursor:pointer;font-weight:700}
  .msg{font-size:12px;color:var(--muted);margin-top:8px;min-height:15px;font-weight:600}
  hr{border:0;border-top:1px solid var(--line);margin:14px 0}
</style>
</head>
<body>
  <div class="top">
    <div class="logo">D</div>
    <div style="flex:1"><h1>DedupManager</h1><div class="sync" id="sync">—</div></div>
  </div>

  <label>I am</label>
  <select id="me"></select>

  <div class="toggle">
    <div><b>Active mode</b><div class="d">Auto-check profiles as you browse</div></div>
    <label class="switch"><input type="checkbox" id="active"><span class="slider"></span></label>
  </div>

  <button class="btn" id="syncBtn">Sync now</button>

  <details id="connDetails">
    <summary>Connection settings</summary>

    <label>Paste team config (easiest)</label>
    <input id="importStr" placeholder="paste the config string from your host…">
    <button class="btn" id="importBtn">Import config</button>

    <hr>

    <label>…or set manually — Apps Script URL (/exec)</label>
    <input id="apiUrl" placeholder="https://script.google.com/macros/s/…/exec">
    <label>Team API key</label>
    <input id="apiKey" type="password" placeholder="shared secret">
    <button class="btn ghost" id="saveCfg">Save connection</button>
    <button class="btn ghost" id="exportBtn">Copy shareable config</button>
  </details>

  <div class="msg" id="msg"></div>
  <script src="popup.js"></script>
</body>
</html>
